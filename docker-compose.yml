name: bharadwaj-cafe

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: bharadwaj-cafe
    volumes:
      - mongo-data:/data/db
    ports:
      # Exposed so you can point Compass at it during development.
      - '27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Cache and rate-limit counters only — nothing here needs to survive a
    # restart, so no volume and no persistence.
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/bharadwaj-cafe
      REDIS_URL: redis://redis:6379
      # Overridable, but defaulted so `docker compose up` works with no .env.
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me-0123456789abcdef}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      # No SMTP in local Compose; the mailer degrades to a logged no-op.
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    ports:
      - '5000:5000'

  web:
    build:
      context: ./frontend
      args:
        # Baked in at build time — Vite cannot read this at runtime.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '8080:80'

volumes:
  mongo-data:
