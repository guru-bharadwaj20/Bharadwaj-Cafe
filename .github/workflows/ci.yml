name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A new push to the same branch cancels the in-flight run for it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck backend
        working-directory: backend
        run: npm run typecheck

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Check backend formatting
        working-directory: backend
        run: npm run format:check

      - name: Check frontend formatting
        working-directory: frontend
        run: npm run format:check

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      # A real MongoDB, so tests never download the ~780MB mongod binary
      # that mongodb-memory-server needs for local runs.
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests with coverage
        working-directory: backend
        env:
          MONGO_URI_TEST: mongodb://localhost:27017/bharadwaj-cafe-test
        run: npm run test:coverage

      # Proves the TypeScript actually compiles to runnable output, which
      # `tsc --noEmit` alone does not.
      - name: Build
        working-directory: backend
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 7

  frontend-tests:
    name: Frontend tests & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 7

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    # Only worth the runner minutes once the cheaper checks have passed.
    needs: [backend-tests, frontend-tests]
    services:
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend
          npm ci --prefix frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        # --with-deps pulls system libraries; the cache only covers the browsers.
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        env:
          MONGO_URI_TEST: mongodb://localhost:27017/bharadwaj-cafe-e2e
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  docker:
    name: Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      # Build only — no push. This exists to catch a broken Dockerfile at PR
      # time rather than at deploy time.
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: bharadwaj-cafe-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: bharadwaj-cafe-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      # Proves the compiled image actually boots and serves traffic, which a
      # successful build alone does not.
      - name: Smoke-test the API image
        run: |
          docker run -d --name api-smoke \
            -e MONGO_URI=mongodb://127.0.0.1:27017/smoke \
            -e JWT_SECRET=ci-smoke-secret-that-is-at-least-32-chars \
            -p 5000:5000 bharadwaj-cafe-api:ci
          for i in $(seq 1 30); do
            if curl -fs http://localhost:5000/api/health > /dev/null; then
              echo "API responded to /api/health"
              docker rm -f api-smoke
              exit 0
            fi
            sleep 2
          done
          echo "API never became healthy. Logs:"
          docker logs api-smoke
          docker rm -f api-smoke
          exit 1

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Advisory only: a newly disclosed transitive CVE should raise a flag,
      # not block an unrelated pull request.
      - name: Audit backend
        working-directory: backend
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Audit frontend
        working-directory: frontend
        continue-on-error: true
        run: npm audit --audit-level=high
